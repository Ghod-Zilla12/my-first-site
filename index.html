<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Dev Portfolio</title>
<style>
    body {
        background-color: #0f172a;
        color: #f8fafc;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }
    h1 {
        font-size: 2.5rem;
        background: linear-gradient(90deg, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .btn {
        display: inline-block;
        margin-top: 20px;
        padding: 10px 20px;
        background: #6366f1;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }
</style>
</head>
<body>
    <div class="container">
        <h1 id="greeting">Hello!</h1>
        <p>I am a Web Developer in training. Building something great here soon.</p>
        <a href="http://www.youtube.com/@Ghod_Zilla" class="btn" target="_blank">My YouTube Journey</a>
    </div>
    <script>
    const hr = new Date().getHours();
    const el = document.getElementById('greeting');
    if (hr < 12) el.innerText = "Good Morning! ☀️";
    else if (hr < 18) el.innerText = "Good Afternoon! 🚀";
    else el.innerText = "Good Evening! 🌙";
</script>
</body>
</html>
