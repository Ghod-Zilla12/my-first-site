<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghod-Zilla12 | Dev Hub</title>
    <style>
        :root {
            --bg: #1a0b2e;
            --neon: #00ff88;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            }
            
        /* Profile Section */
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            margin-bottom: 15px;
            box-shadow: 0 0 15px var(--neon);
            }
            
            h1 { margin: 10px 0; font-size: 1.5rem; }
        p { color: #ccaaff; margin-bottom: 30px; text-align: center; }

        /* The Links Container */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
        background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .link-card:hover {
            border-color: var(--neon);
            background: rgba(0, 255, 136, 0.1);
            transform: translateY(-3px);
        }

        .highlight {
            background: var(--neon);
            color: black;
            } 
           </style>
</head>
<body>

    <img src="https://github.com/Ghod-Zilla12.png" alt="Profile" class="profile-pic">
    
    <h1 id="greeting">Loading...</h1>
    <p>Android Developer | Building in Public 🚀</p>

    <div class="links-container">
        <a href="#" class="link-card highlight">📺 My YouTube Journey</a>
        
        <a href="#" class="link-card">🧮 Calculator App (In Progress)</a>
        
        <a href="https://github.com/Ghod-Zilla12" class="link-card">🐙 Follow my GitHub</a>
    </div>

    <script>
        const now = new Date();
        const hour = now.getHours();
        const greetingElement = document.getElementById('greeting');
        
        if (hour < 12) greetingElement.innerText = "Good Morning, World!";
        else if (hour < 18) greetingElement.innerText = "Good Afternoon!";
        else greetingElement.innerText = "Good Evening!";
    </script>
</body>
</html>Enter<<!DOCTYPE html>
