<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghod-Zilla12 | Dev Hub</title>
    <style>
    :root {
            --bg: #1a0b2e;
            --neon: #00ff88;
            --glass: rgba(255, 255, 255, 0.1);
            --pink: #ff0077;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            min-height; 100vh;
            }
            
        /* Profile Section */
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--neon);
            margin-bottom: 15px;
            box-shadow: 0 0 15px var(--neon);
            }
            
            h1 { margin: 10px 0; font-size: 1.5rem; }
        p { color: #ccaaff; margin-bottom: 30px; text-align: center; }

        /* The Links Container */
        .links-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            font-weight: bold;
            transition: 0.3s;
            box-sizing: border-box; /*Fixed the corner issue*/
        }

        .highlight {
            background: var(--neon);
            color: black;
            box-shadow: 0 0 10px var(--neon);
            } 
            
        .contact-btn {
            border: 1px solid var(--pink); 
            color: var (--pink);
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2300ff88'/><text y='75' x='22' font-size='70'font-family='sans-serif' font-weight='bold' fill='black'>Z</text></svg>?v=2">
</head>
<body>
    <img src="https://github.com/Ghod-Zilla12.png" alt="Profile" class="profile-pic">
    
    <h1 id="greeting">Loading...</h1>
    <p>Android Developer | Building in Public 🚀</p>

    <div class="links-container">
        <a href="http://www.youtube.com/@Ghod_Zilla" class="link-card highlight">📺 My YouTube Journey</a>
        
        <a href="calc.html" class="link-card">🧮 Calculator App</a>
        
        <a href="https://github.com/Ghod-Zilla12" class="link-card">🐙 Follow my GitHub</a>
        
        <a href="mailto: samuelu573@gmail.com" class="link-card contact-btn">📧 contact me</a>
    </div>

    <script>
        const now = new Date();
        const hour = now.getHours();
        const greetingElement = document.getElementById('greeting');
        
        if (hour < 12) greetingElement.innerText = "Good Morning, World!";
        else if (hour < 18) greetingElement.innerText = "Good Afternoon!";
        else greetingElement.innerText = "Good Evening!";
    </script>
</body>
    </html>
